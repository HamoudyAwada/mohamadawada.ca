name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 3 days at 09:00 UTC
    - cron: "0 9 */3 * *"
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Query keepalive table to register database activity
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/rest/v1/keepalive?select=message&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Keepalive query status: $STATUS"

          if [ "$STATUS" -eq 200 ]; then
            echo "Database activity registered. Project is alive."
          else
            echo "Unexpected status: $STATUS. Check that the keepalive table exists with anon SELECT access."
            exit 1
          fi
