name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 6 days at 09:00 UTC (well before the 7-day pause threshold)
    - cron: "0 9 */6 * *"
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Verify project is up
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/auth/v1/health")

          echo "Auth health status: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase project is up."
          else
            echo "Project may be paused or unreachable. Status: $STATUS"
            exit 1
          fi

      - name: Ping REST API to register activity
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "REST API status: $STATUS"

          # 200 = success, 401 = auth required — both mean Supabase received the request
          # A paused/unreachable project would return 5xx or time out entirely
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "Activity registered with Supabase."
          else
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
