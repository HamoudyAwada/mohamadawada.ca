name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 6 days at 09:00 UTC (well before the 7-day pause threshold)
    - cron: "0 9 */6 * *"
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Ping Edge Function to prevent inactivity pause
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/functions/v1/server/make-server-2821aa23/health" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Supabase response status: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase Edge Function is alive."
          else
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
